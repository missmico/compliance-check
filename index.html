<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>医疗合规快查</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; }
    #chat-container { width: 100%; height: 100vh; }
    #debug { position: fixed; top: 0; left: 0; background: yellow; padding: 5px; font-size: 12px; z-index: 99999; display: none; }
  </style>
</head>
<body>

  <div id="debug"></div>
  <div id="chat-container"></div>

  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.2.0-beta.10/libs/cn/index.js"></script>

  <script>
    function showDebug(msg) {
      var d = document.getElementById('debug');
      d.style.display = 'block';
      d.textContent = msg;
    }

    try {
      showDebug('SDK加载中...');
      
      var client = new CozeWebSDK.WebChatClient({
        config: {
          bot_id: '7637385009837506595',
        },
        auth: {
          type: 'token',
          token: 'pat_okkMDNqzycK9zrGe2GQ7XXcHiPSd1OjyyAztyOonGrJXJcsaP3ifHN5fN3KCiVeN',
          onRefreshToken: function () {
            return 'pat_okkMDNqzycK9zrGe2GQ7XXcHiPSd1OjyyAztyOonGrJXJcsaP3ifHN5fN3KCiVeN';
          }
        },
        ui: {
          base: {
            layout: 'pc',
            lang: 'zh-CN',
          },
          asstBtn: {
            isNeed: false,
          },
          chatBot: {
            title: '医疗合规快查',
            el: document.getElementById('chat-container'),
          },
        },
      });

      showDebug('SDK初始化成功，等待渲染...');

      setTimeout(function() {
        showDebug('渲染完成');
        setTimeout(function() {
          document.getElementById('debug').style.display = 'none';
        }, 2000);
      }, 3000);

    } catch (err) {
      showDebug('错误: ' + err.message);
    }
  </script>

</body>
</html>
