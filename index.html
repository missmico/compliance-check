<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>医疗合规快查</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    #loading-screen .logo { font-size: 48px; margin-bottom: 16px; }
    #loading-screen h1 { color: white; font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    #loading-screen p { color: rgba(255,255,255,0.8); font-size: 14px; margin-bottom: 24px; }
    #loading-screen .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-tip {
      display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 13px; z-index: 10000;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="logo">⚖️</div>
    <h1>医疗合规快查</h1>
    <p>输入场景问题，秒出合规判断</p>
    <div class="spinner"></div>
  </div>

  <div id="error-tip"></div>

  <script>
    const CONFIG = {
      botId: '7637385009837506595',
      token: 'pat_cEvmt5zQ2YL8WJzSRUihhV7IQoNe9A1XwyVqnHzDGZx3oXZhyCaW3NlYSGrP24Hn',
    };
  </script>

  <script src="https://lf-cdn.coze.cn/obj/unpkg/flow-platform/chat-app-sdk/1.1.0-beta.0/libs/cn/index.js"></script>

  <script>
    if (CONFIG.token === 'YOUR_TOKEN_HERE') {
      document.getElementById('loading-screen').innerHTML = `
        <div class="logo">⚠️</div>
        <h1 style="color:white;font-size:18px;">请先配置Token</h1>
        <p style="color:rgba(255,255,255,0.8);font-size:13px;text-align:center;padding:0 32px;">
          打开HTML文件，将 CONFIG.token 替换为你的扣子个人访问令牌<br>
          将 CONFIG.botId 替换为你的Bot ID
        </p>
      `;
      throw new Error('请先配置Token和Bot ID');
    }

    try {
      const cozeWebSDK = new CozeWebSDK.WebChatClient({
        config: {
          botId: CONFIG.botId,
        },
        auth: {
          type: 'token',
          token: CONFIG.token,
          onRefreshToken: () => CONFIG.token,
        },
        ui: {
          layout: 'mobile',
          lang: 'zh-CN',
          title: '医疗合规快查',
        },
        userInfo: {
          id: '',
          nickname: '',
        },
      });

      setTimeout(() => {
        const loading = document.getElementById('loading-screen');
        loading.classList.add('fade-out');
        setTimeout(() => loading.style.display = 'none', 500);
      }, 1500);

    } catch (err) {
      console.error('SDK初始化失败:', err);
      document.getElementById('loading-screen').innerHTML = `
        <div class="logo">❌</div>
        <h1 style="color:white;font-size:18px;">加载失败</h1>
        <p style="color:rgba(255,255,255,0.8);font-size:13px;text-align:center;padding:0 32px;">
          ${err.message || '请检查网络连接后重试'}
        </p>
      `;
    }
  </script>

</body>
</html>
